# 伺服器 SSH 連線設定
SERVER_USER="root"
SERVER_IP="server1"
SERVER_PORT="22"

# 伺服器上的前端部署目標路徑 (例如: Nginx 的站點目錄)
REMOTE_DEPLOY_PATH="/www/wwwroot/mv.ztmr.club"

# 伺服器上的前端備份目錄
REMOTE_BACKUP_PATH="/www/wwwroot/backup"

