<!DOCTYPE html>
<html class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 加入這行來防止外部圖片破圖 (繞過 Twitter 影片/圖片防盜鏈) -->
    <meta name="referrer" content="no-referrer">

    <title>ZUTOMAYO Gallery</title>
    <meta name="description" content="ZUTOMAYO (ずっと真夜中でいいのに。) 粉絲自建 MV 設定圖資料庫。收錄歷年作品設定資料與高品質預覽。">
    <meta name="keywords" content="ZUTOMAYO, ずっと真夜中でいいのに, ACAね, MV, 設定圖">

    <link rel="icon" type="image/png" href="%BASE_URL%icon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon/favicon.svg">
    <link rel="shortcut icon" href="%BASE_URL%icon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="ZTMY Gallery">
    <link rel="manifest" href="%BASE_URL%icon/site.webmanifest">
    <meta name="theme-color" content="#0d0d0f">

    <link rel="preconnect" href="%VITE_API_ORIGIN%" />
    <link rel="preconnect" href="%VITE_IMGPROXY_ORIGIN%" />
    <link rel="preconnect" href="%VITE_ASSETS_ORIGIN%" />
    <link rel="preconnect" href="%VITE_UNPKG_ORIGIN%" crossorigin />
    <link rel="preconnect" href="%VITE_WALINE_SERVER_URL%" />

    <meta property="og:title" content="ZUTOMAYO Gallery">
    <meta property="og:description" content="收錄 ZTMY 歷年 MV 設定資料。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="%VITE_ASSETS_ORIGIN%%VITE_TWITTER_PROXY_PATH%/your-default-og-image.jpg">
    <link rel="stylesheet" href="%VITE_UNPKG_ORIGIN%/@waline/client@v3/dist/waline-meta.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="%VITE_UNPKG_ORIGIN%/@waline/client@v3/dist/waline-meta.css"></noscript>
    <link rel="stylesheet" href="%BASE_URL%assets/css/fonts.css?v=%VITE_APP_VERSION%">
    <link rel="stylesheet" href="/src/tailwind.css">
    <script>
        (function() {
            try {
                var savedTheme = localStorage.getItem("theme");
                if (savedTheme === "light" || savedTheme === "dark") {
                    document.documentElement.classList.add(savedTheme);
                } else {
                    document.documentElement.classList.add("dark");
                }
            } catch (e) {
                document.documentElement.classList.add("dark");
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
