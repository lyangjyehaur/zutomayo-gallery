<!DOCTYPE html>
<html class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- 加入這行來防止外部圖片破圖 (繞過 Twitter 影片/圖片防盜鏈) -->
    <meta name="referrer" content="no-referrer">

    <title>ZUTOMAYO Gallery</title>
    <meta name="description" content="ZUTOMAYO (ずっと真夜中でいいのに。) 粉絲自建 MV 設定圖資料庫。收錄歷年作品設定資料與高品質預覽。">
    <meta name="keywords" content="ZUTOMAYO, ずっと真夜中でいいのに, ACAね, MV, 設定圖">

    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg">
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon-180x180.png">
    <meta name="theme-color" content="#0d0d0f">

    <meta property="og:title" content="ZUTOMAYO Gallery">
    <meta property="og:description" content="收錄 ZTMY 歷年 MV 設定資料。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://assets.ztmr.club/ti/your-default-og-image.jpg">
    <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline-meta.css">
    <link rel="stylesheet" href="%BASE_URL%assets/css/fonts.css?v=%VITE_APP_VERSION%">
    <link rel="stylesheet" href="/src/tailwind.css">
    <script>
        (function() {
            try {
                var savedTheme = localStorage.getItem("theme");
                if (savedTheme === "light" || savedTheme === "dark") {
                    document.documentElement.classList.add(savedTheme);
                } else {
                    document.documentElement.classList.add("dark");
                }
            } catch (e) {
                document.documentElement.classList.add("dark");
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
