    <script>
        (function() {
            try {
                var savedTheme = localStorage.getItem("theme");
                if (savedTheme === "light" || savedTheme === "dark") {
                    document.documentElement.classList.add(savedTheme);
                } else {
                    document.documentElement.classList.add("dark");
                }
            } catch (e) {
                document.documentElement.classList.add("dark");
            }
        })();
    </script>
