<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>ZTMY Gallery 重設密碼</title>
  </head>
  <body style="margin:0;padding:0;background:#f7f7f7;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
      點擊連結重設密碼（有效期有限）
    </div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;background:#f7f7f7;">
      <tr>
        <td align="center" style="padding:24px 12px;">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="border-collapse:collapse;width:600px;max-width:600px;background:#ffffff;border:2px solid #000000;">
            <tr>
              <td style="background:#000000;padding:16px 18px;color:#ffffff;">
                <div style="font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:.8;">
                  ZUTOMAYO GALLERY
                </div>
                <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,'Noto Sans',sans-serif;font-size:22px;line-height:1.2;font-weight:800;margin-top:6px;">
                  重設密碼
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 18px 0;">
                <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,'Noto Sans',sans-serif;font-size:14px;line-height:1.7;color:#111111;">
                  你正在重設 ZTMY Gallery 的密碼。請點擊下方按鈕設定新密碼（有效時間有限，請勿轉發）。
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:18px;">
                <table role="presentation" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                  <tr>
                    <td bgcolor="#000000" style="border:2px solid #000000;">
                      <a href="{{link}}" style="display:inline-block;padding:12px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,'Noto Sans',sans-serif;font-size:14px;font-weight:800;color:#ffffff;text-decoration:none;">
                        重設密碼
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:0 18px 18px;">
                <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,'Noto Sans',sans-serif;font-size:12px;line-height:1.6;color:#555555;">
                  若按鈕無法點擊，請複製此連結到瀏覽器：<br />
                  <span style="word-break:break-all;color:#000000;">{{link}}</span>
                </div>
                <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,'Noto Sans',sans-serif;font-size:12px;line-height:1.6;color:#777777;margin-top:10px;">
                  若非你本人操作，請忽略此郵件。
                </div>
              </td>
            </tr>
            <tr>
              <td style="border-top:2px solid #000000;background:#f5f5f5;padding:12px 18px;">
                <div style="font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace;font-size:11px;line-height:1.6;color:#333333;">
                  SECURITY NOTICE · DO NOT FORWARD
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
